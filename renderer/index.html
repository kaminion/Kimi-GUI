<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <!-- Self-contained app: scripts/styles/images only from the app bundle. -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none'">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kimi</title>
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
</head>
<body>
  <div id="titlebar"></div>
  <div id="app">
    <aside id="sidebar">
      <div id="sidebar-header">
        <button id="new-chat-btn" type="button" title="새 대화 (⌘N)">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true">
            <path d="M6.5 1.5v10M1.5 6.5h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span>새 대화</span>
        </button>
      </div>
      <nav id="session-list" aria-label="대화 목록"></nav>
      <div id="sidebar-footer">
        <button id="usage-nav-btn" type="button" title="사용량 (⌘,)">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true">
            <path d="M2 11.5v-4M6.5 11.5v-9M11 11.5V7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span>사용량</span>
        </button>
        <span id="server-status" role="status" aria-label="서버 상태"></span>
      </div>
    </aside>
    <main id="main">
      <section id="chat-view">
        <header id="chat-header">
          <span id="chat-title"></span>
          <span id="model-label"></span>
          <span id="context-meter"></span>
          <button id="abort-btn" type="button" hidden>중단</button>
        </header>
        <div id="transcript"></div>
        <div id="composer-wrap">
          <textarea id="composer" rows="1" placeholder="메시지를 입력하세요…" aria-label="메시지 입력"></textarea>
          <button id="send-btn" type="button" title="전송 (↵)" aria-label="전송">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <path d="M7 12V2M3 6l4-4 4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </section>
      <section id="usage-view" hidden>
        <div id="quota-cards"></div>
        <div id="session-usage"></div>
      </section>
    </main>
  </div>
  <div id="modal-root"></div>
  <!-- Fatal boot error (CLI missing / server launch failed). Inline styles keep it
       legible regardless of stylesheet state; design agent may restyle later. -->
  <div id="boot-error" style="display:none; position:fixed; inset:0; z-index:999;
       flex-direction:column; align-items:center; justify-content:center; gap:16px;
       padding:32px; text-align:center; background:var(--bg, #fff); color:var(--text, #1d1d1f);
       font-family:var(--font-ui, -apple-system, sans-serif);">
    <h1 style="font-size:17px; font-weight:600; margin:0;">Kimi를 시작할 수 없습니다</h1>
    <p id="boot-error-message" style="font-size:13px; margin:0; max-width:420px;
       color:var(--text-secondary, #6e6e73); word-break:break-all;"></p>
    <p style="font-size:12px; margin:0; max-width:420px; color:var(--text-dim, #86868b);">
      Kimi Code CLI가 설치되어 있는지 확인한 뒤 다시 시도하세요.
    </p>
    <button id="boot-retry-btn" type="button" style="font-size:13px; padding:6px 16px;
      border:none; border-radius:6px; cursor:pointer;
      background:var(--accent, #007AFF); color:var(--accent-text, #fff);">다시 시도</button>
  </div>
  <script src="vendor/marked.min.js"></script>
  <script src="vendor/highlight.min.js"></script>
  <script src="js/markdown.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/approvals.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/usage.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
